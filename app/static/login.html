<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Login · Payroll Calculator</title>
<link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body class="login-body">
<div class="login-card">
  <h1>Payroll Calculator</h1>
  <div class="tabs small">
    <button class="tab active" data-mode="login">Sign in</button>
    <button class="tab" data-mode="register">Register company</button>
  </div>

  <form id="login-form">
    <label>Email <input name="email" type="email" value="admin@acme.test" required></label>
    <label>Password <input name="password" type="password" value="admin123" required></label>
    <button type="submit">Sign in</button>
  </form>

  <form id="register-form" style="display:none">
    <label>Company name <input name="company_name" required></label>
    <label>Admin email <input name="email" type="email" required></label>
    <label>Password <input name="password" type="password" required></label>
    <button type="submit">Create company &amp; sign in</button>
  </form>

  <p class="hint">Demo account preloaded: <b>admin@acme.test / admin123</b> (ACME Corp).</p>
  <p id="msg" class="err"></p>
</div>
<script>
const $ = s => document.querySelector(s);
document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  $("#login-form").style.display = t.dataset.mode === "login" ? "" : "none";
  $("#register-form").style.display = t.dataset.mode === "register" ? "" : "none";
});
async function post(url, data) {
  const r = await fetch(url, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(data) });
  if (!r.ok) throw new Error((await r.json()).detail || "error");
  return r.json();
}
$("#login-form").onsubmit = async e => {
  e.preventDefault();
  try {
    await post("/api/auth/login", Object.fromEntries(new FormData(e.target)));
    location.href = "/";
  } catch(err) { $("#msg").textContent = err.message; }
};
$("#register-form").onsubmit = async e => {
  e.preventDefault();
  try {
    await post("/api/auth/register", Object.fromEntries(new FormData(e.target)));
    location.href = "/";
  } catch(err) { $("#msg").textContent = err.message; }
};
</script>
</body>
</html>
